name: Integrity Audit (KST 16:10)

on:
  schedule:
    # KST 16:10 = UTC 07:10 (월~금) — 장마감 후 당일 거래까지 반영해 원장 검산
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

jobs:
  run-integrity-audit:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      TZ: "Asia/Seoul"

    steps:
      - name: Call Vercel IntegrityAudit API
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${VERCEL_APP_URL}" ]; then
            echo "::error::VERCEL_APP_URL secret is not set"
            exit 1
          fi
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          BASE_URL="${VERCEL_APP_URL%/}"
          TARGET_URL="${BASE_URL}/api/cron/integrityAudit"

          echo "📤 Triggering integrity audit (KST ~16:10)..."

          HTTP_CODE=$(curl -s -L -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TARGET_URL}")

          echo "HTTP Status: ${HTTP_CODE}"
          cat /tmp/response.txt

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::IntegrityAudit API returned ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ Integrity audit completed"
