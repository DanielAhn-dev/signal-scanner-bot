name: Telegram Briefing (장전/마감)

on:
  schedule:
    # 장전 브리핑: KST 08:30 = UTC 23:30 (전날) — 일~목
    - cron: "30 23 * * 0-4"
    # 마감 브리핑: KST 15:40 = UTC 06:40 — 월~금
    - cron: "40 6 * * 1-5"
  workflow_dispatch:
    inputs:
      type:
        description: "Briefing type"
        required: false
        default: "pre_market"
        type: choice
        options:
          - pre_market
          - market_close

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      TZ: "Asia/Seoul"

    steps:
      - name: Determine briefing type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "briefing_type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            SCHEDULE="${{ github.event.schedule }}"
            if [ "$SCHEDULE" = "30 23 * * 0-4" ]; then
              echo "briefing_type=pre_market" >> $GITHUB_OUTPUT
            elif [ "$SCHEDULE" = "40 6 * * 1-5" ]; then
              echo "briefing_type=market_close" >> $GITHUB_OUTPUT
            else
              echo "::warning::Unknown schedule '$SCHEDULE', fallback to UTC hour detection"
              HOUR=$(date -u +%H)
              if [ "$HOUR" -eq 23 ]; then
                echo "briefing_type=pre_market" >> $GITHUB_OUTPUT
              elif [ "$HOUR" -eq 6 ]; then
                echo "briefing_type=market_close" >> $GITHUB_OUTPUT
              else
                echo "::error::Unable to determine briefing type. event.schedule='$SCHEDULE', hour='$HOUR'"
                exit 1
              fi
            fi
          else
            HOUR=$(date -u +%H)
            # 비정상 이벤트 대비 안전 분기 (엄격 매칭)
            if [ "$HOUR" -eq 23 ]; then
              echo "briefing_type=pre_market" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -eq 6 ]; then
              echo "briefing_type=market_close" >> $GITHUB_OUTPUT
            else
              echo "::error::Unexpected event '${{ github.event_name }}' at UTC hour '$HOUR'"
              exit 1
            fi
          fi

          echo "Selected briefing_type=$(cat $GITHUB_OUTPUT | grep briefing_type | cut -d'=' -f2)"

      - name: Call Vercel Briefing API
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${VERCEL_APP_URL}" ]; then
            echo "::error::VERCEL_APP_URL secret is not set"
            exit 1
          fi
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          TYPE="${{ steps.type.outputs.briefing_type }}"
          BASE_URL="${VERCEL_APP_URL%/}"
          echo "📤 Sending ${TYPE} briefing..."

          HTTP_CODE=$(curl -s -L -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/briefing?type=${TYPE}")

          echo "HTTP Status: ${HTTP_CODE}"
          cat /tmp/response.txt

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Briefing API returned ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ ${TYPE} briefing sent successfully"
