name: Virtual AutoTrade Close (KST 14:50)

on:
  schedule:
    # KST 14:50 = UTC 05:50 (월~금) — 장마감 40분 전 마지막 매수/매도
    - cron: "50 5 * * 1-5"
  workflow_dispatch:

jobs:
  run-virtual-autotrade-close:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      TZ: "Asia/Seoul"

    steps:
      - name: Call Vercel VirtualAutoTrade API (pre-close)
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${VERCEL_APP_URL}" ]; then
            echo "::error::VERCEL_APP_URL secret is not set"
            exit 1
          fi
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          BASE_URL="${VERCEL_APP_URL%/}"
          # windowMinutes=30: T14:30 버킷 — 오후 13:30(T12:00버킷)과 중복 없음
          TARGET_URL="${BASE_URL}/api/cron/virtualAutoTrade?mode=auto&intradayOnly=true&windowMinutes=30&maxUsers=60"

          echo "📤 Triggering pre-close virtual autotrade (KST ~14:50)..."
          echo "Target: ${TARGET_URL}"

          HTTP_CODE=$(curl -s -L -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TARGET_URL}")

          echo "HTTP Status: ${HTTP_CODE}"
          cat /tmp/response.txt

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::VirtualAutoTrade API returned ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ Pre-close virtual autotrade completed"
