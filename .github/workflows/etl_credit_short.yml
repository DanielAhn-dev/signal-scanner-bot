name: ETL - Credit & Short Data

on:
  schedule:
    # 장 마감 후: 매주 월~금 08:30 UTC (한국시간 17:30, 장 마감 30분 후)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '기준 거래일 (YYYYMMDD, 미입력 시 자동 감지)'
        required: false
      skip_credit:
        description: '신용비율 수집 스킵'
        type: boolean
        default: false
      skip_short:
        description: '공매도 수집 스킵'
        type: boolean
        default: false

jobs:
  etl:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pykrx supabase requests beautifulsoup4 python-dotenv
          # playwright는 KRX 차단 시 브라우저 폴백용 (선택적)
          pip install playwright || true
          python -m playwright install chromium --with-deps || true

      - name: Run ETL - Credit & Short
        id: etl_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.skip_credit }}" = "true" ]; then
            ARGS="$ARGS --skip-credit"
          fi
          if [ "${{ github.event.inputs.skip_short }}" = "true" ]; then
            ARGS="$ARGS --skip-short"
          fi
            # KRX data.krx.co.kr는 GitHub Actions(Azure IP)를 차단함 → 기본으로 --skip-short
            ARGS="$ARGS --skip-short"
            # Naver 신용비율 SPA 마이그레이션으로 --skip-credit도 기본 적용
            ARGS="$ARGS --skip-credit"
            python scripts/update_credit_short.py $ARGS 2>&1 | tee /tmp/etl_output.txt
          # 저장 건수 0이면 경고 종료코드
          if grep -q "저장할 데이터 없음" /tmp/etl_output.txt; then
            echo "::warning::공매도/신용 데이터 저장 건수 0 — KRX 차단 또는 비거래일"
          fi

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: etl-log-${{ github.run_id }}
          path: /tmp/etl_output.txt
          retention-days: 7
