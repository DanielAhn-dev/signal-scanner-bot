name: Daily Market Data Sync

on:
  schedule:
    # 장 마감 후 데이터 수집: KST 18:10 = UTC 09:10 (월~금)
    - cron: "10 9 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: "Asia/Seoul"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx supabase requests

      - name: Run Daily Batch (All-in-one)
        run: |
          echo "🚀 Starting daily batch: $(date)"
          python scripts/daily_batch.py
          echo "🏁 Finished: $(date)"
